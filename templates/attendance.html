{% extends "base.html" %}

{% block title %}Attendance{% endblock %}

{% block content %}
<h1>Attendance Records</h1>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>User</th>
            <th>Date</th>
            <th>Status</th>
        </tr>
    </thead>

    <tbody>
        {% for record in records %}
        <tr>
            <td>{{ record.user_id }}</td>
            <td>{{ record.date }}</td>
            <td>{{ record.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
